<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Live Opros</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--off-white);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 48px 40px;
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .login-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: var(--radius-lg);
      background: var(--accent-gradient);
      margin-bottom: 24px;
    }

    .login-logo svg {
      width: 32px;
      height: 32px;
      fill: white;
    }

    .login-card h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .login-card p {
      font-size: 15px;
      margin-bottom: 32px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .login-error {
      color: var(--red);
      font-size: 14px;
      font-weight: 500;
      padding: 10px;
      background: var(--red-light);
      border-radius: var(--radius-sm);
    }
  </style>
</head>
<body>
  <div class="login-card slide-up">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><path d="M9.5 3A6.5 6.5 0 0 1 16 9.5c0 1.61-.59 3.09-1.56 4.23l.27.27h.79l5 5-1.5 1.5-5-5v-.79l-.27-.27A6.516 6.516 0 0 1 9.5 16 6.5 6.5 0 0 1 3 9.5 6.5 6.5 0 0 1 9.5 3m0 2C7 5 5 7 5 9.5S7 14 9.5 14 14 12 14 9.5 12 5 9.5 5Z"/></svg>
    </div>
    <h1>Панель управления</h1>
    <p>Введите пароль для доступа к администрированию</p>

    <form class="login-form" id="login-form">
      <input
        type="password"
        id="password-input"
        class="input input-lg"
        placeholder="Пароль"
        autocomplete="current-password"
        required
        autofocus
      >
      <div id="login-error" class="login-error hidden"></div>
      <button type="submit" id="login-btn" class="btn btn-accent btn-lg btn-block">
        Войти
      </button>
    </form>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
